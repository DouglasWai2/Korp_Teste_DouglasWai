# .air.toml
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Point to your cmd/main.go
  cmd = "go build -o ./tmp/main ./cmd/main.go"
  bin = "tmp/main"

  # Watch these directories for changes
  include_dir = ["cmd", "internal", "config", "router"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  exclude_regex = ["_test\\.go"]

  delay = 1000       # ms before rebuild after a change
  stop_on_error = true
  send_interrupt = false
  kill_delay = "0.5s"

[log]
  time = false

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = false